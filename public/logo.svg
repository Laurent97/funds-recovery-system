    <path d="M7 12 L9 14 L13 10" fill="none" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- KRYVEX Text -->
  <text x="60" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e40af">KRYVEX</text>
  
  <!-- TRADING Text -->
